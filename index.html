<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 in 5</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="gameTitle"><span class="pulse">5</span> in <span class="pulse">5</span></h1>

<div id="instructions">
<strong>Uputstvo:</strong>
<ul>
<li>Kliknite 5 puta na crveni kružić za 5 sekundi</li>
<li>Najbliže vreme 5 sekundi je pobednik</li>
<li>Igra ima maksimalno 5 rundi</li>
</ul>
</div>

<button id="resetBtn">Reset</button>

<div id="container">
<div id="gameCol">
<div id="gameStats">
<h2>Klikovi: <span id="clicks">0</span>/5</h2>
<h2>Vreme: <span id="time">0.000</span>s</h2>
</div>
<div id="gameArea"><div id="circle"></div></div>
</div>
<div id="sidebar">
<h2>Vremena</h2>
<ul id="times"></ul>
</div>
</div>

<div id="overlay"></div>

<div id="sharePopup">
<h2>Čestitamo!</h2>
<p id="bestResultText"></p>
<button id="facebookShare" class="fbShare">
<i class="fab fa-facebook-f"></i> Share on Facebook
</button>
<br><br>
<button id="closePopup">Zatvori</button>
</div>

<script src="script.js"></script>

</body>
</html>
