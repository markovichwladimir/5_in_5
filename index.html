<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 in 5</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<link rel="stylesheet" href="style.css">
</head>

<body>

<h1 id="gameTitle"><span class="pulse">5</span> in <span class="pulse">5</span></h1>

<div id="playerBar">Player: <span id="playerName"></span> <button id="changeNameBtn">Change</button></div>

<div id="nameModal">
<div id="nameBox">
<h2>Welcome!</h2>
<p>Enter your name:</p>
<input id="nameInput" type="text" maxlength="30" placeholder="Your name">
<br><br>
<button id="saveNameBtn">Confirm</button>
</div>
</div>

<div id="instructions">
<strong>Instructions:</strong>
<ul>
<li>Click the red circle 5 times in 5 seconds</li>
<li>The time closest to 5 seconds wins</li>
<li>The game has a maximum of 5 rounds</li>
</ul>
</div>

<button id="resetBtn">Reset</button>

<div id="container">
<div id="gameCol">
<div id="gameStats">
<h2>Clicks: <span id="clicks">0</span>/5</h2>
<h2>Time: <span id="time">0.000</span>s</h2>
</div>
<div id="gameArea"><div id="circle"></div></div>
</div>
<div id="sidebar">
<h2>Times</h2>
<ul id="times"></ul>
</div>
</div>

<div id="overlay"></div>

<div id="sharePopup">
<h2>Congratulations!</h2>
<p id="bestResultText"></p>
<button id="facebookShare" class="fbShare">
<i class="fab fa-facebook-f"></i> Share on Facebook
</button>
<br><br>
<button id="closePopup">Close</button>
</div>

<script src="script.js"></script>

</body>
</html>
